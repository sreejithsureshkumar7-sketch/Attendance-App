<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Attendance Save</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <section id="loginPage" class="card login">
      <h1>🎓 Student Details Login</h1>
      <p>Admin login pannitu students details add pannalam.</p>
      <input id="username" placeholder="Username"/>
      <input id="password" type="password" placeholder="Password"/>
      <button onclick="login()">Login</button>
      <small>Default: admin / admin123</small>
    </section>

    <section id="appPage" class="hidden">
      <div class="top">
        <h1>Madha Attendance - Student Details</h1>
        <button class="logout" onclick="logout()">Logout</button>
      </div>

      <section class="card">
        <h2>Add Student Details</h2>
        <div class="grid">
          <input id="name" placeholder="Student Name"/>
          <input id="roll" placeholder="Roll No"/>
          <select id="department">
            <option value="">Select Department</option>
            <option>Computer Science</option>
            <option>BCA</option>
            <option>B.Com</option>
            <option>BBA</option>
            <option>Mathematics</option>
            <option>English</option>
          </select>
          <select id="year">
            <option value="">Select Year</option>
            <option>I Year</option>
            <option>II Year</option>
            <option>III Year</option>
          </select>
          <input id="phone" placeholder="Student Phone"/>
          <input id="parentPhone" placeholder="Parent Phone with country code e.g. 919876543210"/>
          <input id="email" placeholder="Email"/>
          <input id="address" placeholder="Address"/>
        </div>
        <button onclick="saveStudent()">Save Student to Firebase</button>
      </section>

      <section class="card">
        <h2>Check Firebase Stored Data</h2>
        <div class="filters">
          <select id="filterDept" onchange="loadStudents()">
            <option value="">All Departments</option>
            <option>Computer Science</option>
            <option>BCA</option>
            <option>B.Com</option>
            <option>BBA</option>
            <option>Mathematics</option>
            <option>English</option>
          </select>
          <select id="filterYear" onchange="loadStudents()">
            <option value="">All Years</option>
            <option>I Year</option>
            <option>II Year</option>
            <option>III Year</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th><th>Roll</th><th>Department</th><th>Year</th><th>Parent</th><th>Notify</th>
              </tr>
            </thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Weekly & Monthly Analytics</h2>
        <canvas id="analyticsChart"></canvas>
      </section>
    </section>
  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
